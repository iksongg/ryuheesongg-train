<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>열차 조회 화면</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .phone-frame {
      width: 402px;
      min-height: 100vh;
      background: #f5f5f5;
      position: relative;
      overflow-x: hidden;
    }

    /* ── 상단바 ── */
    .top-bar {
      width: 402px;
      background: white;
      border-bottom: 1px solid #dbdbdb;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* 출도착지 바 */
    .route-bar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }
    .route-bar .back-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .route-bar .route-center {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .route-bar .search-icon { width: 24px; height: 24px; }
    .route-bar .route-names {
      display: flex;
      align-items: center;
    }
    .route-bar .station {
      font-size: 22px;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.5px;
    }
    .route-bar .arrow-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .route-bar .refresh-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* 날짜 바 */
    .date-bar {
      height: 48px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 16px;
    }
    .date-bar .date-nav {
      display: flex;
      align-items: center;
      height: 48px;
      cursor: pointer;
    }
    #date-prev { justify-content: flex-start; }
    #date-next { justify-content: flex-end; }
    .date-bar .date-nav .date-text {
      font-size: 12px;
      color: #757575;
      font-weight: 400;
      white-space: nowrap;
    }
    .date-bar .date-current {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      gap: 2px;
    }
    .date-bar .calendar-icon { width: 24px; height: 24px; flex-shrink: 0; }
    .date-bar .current-date {
      font-size: 20px;
      font-weight: 600;
      color: #3a66af;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    /* 열차 종류 탭 */
    .train-type-tabs {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-top: 1px solid #f0f0f0;
    }
    .train-type-tabs .tab {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #757575;
      font-weight: 400;
      cursor: pointer;
      padding: 0 4px;
      position: relative;
    }
    .train-type-tabs .tab.active {
      color: #3a66af;
      font-weight: 700;
    }
    .train-type-tabs .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #3a66af;
      border-radius: 1px 1px 0 0;
    }

    /* ── 필터바 ── */
    /* 48(route) + 48(date) + 48(tabs) = 144px */
    .filter-bar {
      width: 402px;
      height: 60px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 144px;
      z-index: 99;
    }
    .filter-bar .filter-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid #dbdbdb;
      border-radius: 999px;
      background: white;
      cursor: pointer;
    }
    .filter-btn span {
      font-size: 14px;
      font-weight: 500;
      color: #5b5b5b;
    }
    .soldout-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid #dbdbdb;
      border-radius: 999px;
      background: white;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .soldout-btn span {
      font-size: 14px;
      font-weight: 500;
      color: #424242;
    }

    /* ── 열차 목록 ── */
    .train-list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 열차 카드 공통 */
    .train-card {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(58,102,175,0.08);
    }

    /* 카드 헤더 */
    .card-header {
      background: white;
      border: 1px solid #e0eaf8;
      border-bottom: 1px dashed #e0eaf8;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      border-radius: 8px 8px 0 0;
    }
    .card-header.soldout-header {
      border-color: #dbdbdb;
      border-bottom-style: solid;
    }
    .card-header .train-info {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .train-logo {
      height: 13px;
      max-height: 13px;
      display: inline-flex;
      align-items: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .train-logo svg { display: block; }
    .train-logo img { height: 13px; max-height: 13px; width: auto; object-fit: contain; display: block; }
    .train-number {
      display: flex;
      align-items: center;
      gap: 1px;
    }
    .train-number span { font-size: 12px; color: #000; font-weight: 400; }
    .train-number.soldout span { color: #c1c1c1; }
    /* 열차비교 */
    .compare-btn {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      flex-shrink: 0;
      width: 60px;
      cursor: pointer;
    }
    .compare-btn span { font-size: 12px; color: #8e8e8e; font-weight: 400; white-space: nowrap; }
    .compare-badge {
      width: 14px;
      height: 14px;
      position: relative;
      flex-shrink: 0;
    }

    /* 열차비교 플로팅바 */
    .compare-float-bar {
      position: fixed;
      bottom: 37px;
      left: 50%;
      transform: translateX(-50%);
      width: 250px;
      height: 48px;
      background: #3a66af;
      border-radius: 77px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      z-index: 200;
      box-shadow: 0 4px 20px rgba(58,102,175,0.4);
    }
    .compare-float-bar.visible { display: flex; }
    .compare-float-bar .float-text {
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
      font-family: 'Pretendard', sans-serif;
    }
    .soldout-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .soldout-badge {
      background: #ff452c;
      color: white;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 8px;
    }

    /* 카드 바디 */
    .card-body {
      background: white;
      border-left: 1px solid #e0eaf8;
      border-right: 1px solid #e0eaf8;
      padding: 14px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .card-body.soldout-body {
      border-color: #dbdbdb;
      gap: 16px;
      padding: 14px 10px;
    }
    .departure, .arrival {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 63px;
    }
    .departure .time, .arrival .time {
      font-size: 24px;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.5px;
      line-height: 1.3;
    }
    .departure .time.soldout, .arrival .time.soldout { color: #c1c1c1; }
    .departure .station-name, .arrival .station-name {
      font-size: 10px;
      color: #282828;
      font-weight: 400;
      text-align: center;
      margin-top: 2px;
    }
    .departure .station-name.soldout, .arrival .station-name.soldout { color: #c1c1c1; font-weight: 500; }
    .route-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .duration-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .duration-row .duration {
      font-size: 12px;
      font-weight: 500;
      color: #3a66af;
      white-space: nowrap;
    }
    .duration-row .duration.soldout { color: #8e8e8e; font-weight: 300; }
    .duration-row .train-img {
      width: 25px;
      height: 10px;
      object-fit: contain;
    }
    .route-line { display: none; }
    .stops {
      font-size: 10px;
      color: #5b5b5b;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
    }

    /* 카드 푸터 */
    .card-footer {
      display: flex;
      border: 1px solid #e0eaf8;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
    }
    .card-footer.soldout-footer { border-color: #dbdbdb; }
    .seat-section {
      flex: 1;
      background: #f6f9ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 55px;
      padding: 6px 0;
    }
    .seat-section.soldout-section { background: white; }
    .seat-label-row {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 2px;
    }
    .seat-section.soldout-section .seat-label-row { gap: 4px; }
    .seat-label {
      font-size: 12px;
      font-weight: 500;
      color: #3a66af;
    }
    .seat-label.soldout-label { color: #c1c1c1; }
    .seat-label.special { color: #113e62; }
    .seat-count {
      font-size: 10px;
      font-weight: 500;
      color: white;
      padding: 1px 6px;
      border-radius: 8px;
    }
    .seat-count.orange { background: #ff773c; }
    .seat-count.blue   { background: #3a66af; }
    .seat-count.gray   { background: #c1c1c1; }
    .price {
      font-size: 16px;
      font-weight: 700;
      color: #3a66af;
    }


    /* 매진제외 활성 시 매진카드 숨김 트랜지션 */
    .soldout-card {
      transition: opacity 0.15s;
    }

    @media (max-width: 402px) {
      .phone-frame { width: 100%; }
      .top-bar     { width: 100%; }
      .filter-bar  { width: 100%; }
    }

    /* ── 바텀시트 오버레이 ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .sheet-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── 바텀시트 ── */
    .compare-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 402px;
      height: 565px;
      background: white;
      border-radius: 8px 8px 0 0;
      z-index: 301;
      display: flex;
      flex-direction: column;
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .compare-sheet.open {
      transform: translateX(-50%) translateY(0);
    }
    .compare-sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      flex-shrink: 0;
    }
    .compare-sheet-title {
      font-size: 16px;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.3px;
    }
    .compare-sheet-close {
      width: 48px;
      height: 48px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .compare-sheet-cards {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    @media (max-width: 402px) {
      .compare-sheet { left: 0; transform: translateY(100%); width: 100%; }
      .compare-sheet.open { transform: translateY(0); }
    }

    /* ══════════════════════════════
       출도착지 / 날짜 변경 바텀시트 공통
    ══════════════════════════════ */
    .change-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 402px;
      background: white;
      border-radius: 8px 8px 0 0;
      z-index: 301;
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      overflow: hidden;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.15);
    }
    .change-sheet.open { transform: translateX(-50%) translateY(0); }

    .cs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 60px;
      flex-shrink: 0;
    }
    .cs-header-left { display: flex; align-items: center; gap: 2px; }
    .cs-title { font-size: 16px; font-weight: 600; color: #0f0f0f; letter-spacing: -0.3px; }
    .cs-close {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: none; padding: 0;
    }
    .cs-close:hover { opacity: 0.6; }
    .cs-back-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: none; padding: 0;
      margin-left: -4px;
    }
    .cs-action-btn {
      display: block;
      margin: 12px auto 30px;
      width: 250px; height: 48px;
      background: #3a66af; color: white;
      font-size: 16px; font-weight: 600;
      font-family: 'Pretendard', sans-serif;
      border: none; border-radius: 77px; cursor: pointer;
    }
    .cs-action-btn:hover { opacity: 0.9; }

    /* ── 출도착지 시트 ── */
    .trip-tabs { display: flex; flex-shrink: 0; }
    .trip-tab {
      flex: 1; height: 50px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer; border: none; background: none; color: #0f0f0f;
      border-bottom: 2px solid #dbdbdb;
      transition: border-color 0.2s, color 0.2s;
    }
    .trip-tab.active { border-bottom-color: #3a66af; color: #3a66af; }

    .stn-row {
      display: flex; align-items: center; justify-content: center;
      padding: 30px 0 25px;
      border-bottom: 1px solid #f4f4f4;
    }
    .stn-pick-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      cursor: pointer; border: none; background: none;
      font-family: 'Pretendard', sans-serif;
      padding: 10px 20px; border-radius: 10px; min-width: 100px;
      transition: background 0.15s;
    }
    .stn-pick-btn:hover { background: #f0f5ff; }
    .stn-name { font-size: 22px; font-weight: 700; color: #0f0f0f; line-height: 1.3; }
    .stn-code { font-size: 14px; font-weight: 500; color: #0f0f0f; text-transform: uppercase; line-height: 1.3; }
    .stn-swap-btn {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: none; padding: 0; flex-shrink: 0;
    }

    .cs-summary {
      text-align: center; padding: 20px 0 0;
      font-size: 18px; font-weight: 600; letter-spacing: -0.3px;
    }
    .cs-summary .cs-blue  { color: #3a66af; }
    .cs-summary .cs-black { color: #0f0f0f; }

    /* 역 선택 목록 */
    .stn-pick-list { list-style: none; max-height: 320px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .stn-pick-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; cursor: pointer;
      border-bottom: 1px solid #f4f4f4; transition: background 0.1s;
    }
    .stn-pick-item:last-child { border-bottom: none; }
    .stn-pick-item:hover { background: #f8f9ff; }
    .stn-pick-item.active { background: #eef2fc; }
    .stn-pick-left { display: flex; align-items: center; gap: 10px; }
    .stn-pick-name { font-size: 16px; font-weight: 600; color: #0f0f0f; }
    .stn-pick-code { font-size: 13px; font-weight: 500; color: #8e8e8e; text-transform: uppercase; }
    .stn-pick-item.active .stn-pick-name { color: #3a66af; }
    .stn-pick-item.active .stn-pick-code { color: #3a66af; }
    .stn-pick-check { display: none; color: #3a66af; }
    .stn-pick-item.active .stn-pick-check { display: block; }

    /* ── 날짜 시트 ── */
    .cal-month-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 32px; height: 38px; flex-shrink: 0;
    }
    .cal-month-label { font-size: 14px; font-weight: 600; color: #212121; letter-spacing: -0.3px; }
    .cal-nav-arrows { display: flex; align-items: center; }
    .cal-nav-btn {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: none; color: #212121; padding: 0;
    }
    .cal-nav-btn:disabled { color: #d0d0d0; cursor: default; }

    .cal-body { padding: 0 30px; flex-shrink: 0; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); height: 42px; align-items: center; }
    .cal-weekday { text-align: center; font-size: 12.5px; font-weight: 600; color: #212121; }
    .cal-grid {
      display: flex; flex-direction: column; gap: 8px;
      min-height: 262px; /* 6행×37px + 5gap×8px = 262px 고정 */
    }
    .cal-row { display: grid; grid-template-columns: repeat(7, 1fr); justify-items: center; }
    .cal-cell {
      width: 37px; height: 37px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 50%; user-select: none;
    }
    .cal-cell.empty, .cal-cell.past { cursor: default; }
    .cal-cell-num { font-size: 12.5px; font-weight: 700; line-height: 1; color: #212121; opacity: 0.4; }
    .cal-cell.past .cal-cell-num { color: #757575; opacity: 0.4; }
    .cal-cell:not(.empty):not(.past):not(.sel):hover { background: #f0f5ff; }
    .cal-today-lbl { font-size: 9px; color: #212121; opacity: 0.4; line-height: 1; margin-top: 2px; }
    .cal-cell.sel { background: #3a66af; }
    .cal-cell.sel .cal-cell-num { color: white; opacity: 1; }
    .cal-cell.sel .cal-today-lbl { color: white; opacity: 0.8; }

    .time-divider { height: 1px; background: #f0f0f0; margin: 16px 0 0; }

    /* ── 시간 뱃지 ── */
    .time-section-wrap { padding: 14px 0 0; }
    .time-lbl { font-size: 14px; font-weight: 500; color: #0f0f0f; padding: 0 32px; margin-bottom: 10px; display: block; }
    .time-chip-row {
      display: flex; gap: 7px;
      overflow-x: auto; padding: 2px 32px 6px;
      -ms-overflow-style: none; scrollbar-width: none;
      cursor: grab; user-select: none;
    }
    .time-chip-row:active { cursor: grabbing; }
    .time-chip-row::-webkit-scrollbar { display: none; }
    .time-chip {
      flex-shrink: 0; height: 30px; min-width: 52px; padding: 0 8px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; font-size: 14px;
      font-family: 'Pretendard', sans-serif; font-weight: 400;
      cursor: pointer; border: 1px solid #f4f4f4;
      background: white; color: #757575;
      white-space: nowrap; pointer-events: auto;
    }
    .time-chip.sel {
      background: #3a66af; color: white;
      border-color: #3a66af; font-weight: 600;
    }

    .date-cs-summary {
      text-align: center; padding: 12px 0 0;
      font-size: 18px; font-weight: 600; letter-spacing: -0.3px; min-height: 46px;
    }
    .date-cs-summary .cs-blue  { color: #3a66af; }
    .date-cs-summary .cs-black { color: #0f0f0f; }

    /* ── 정렬 시트 옵션 ── */
    .sort-option {

  /* ── 렌더 함수 ── */
  function renderTopBar() {
    document.getElementById('root-top-bar').innerHTML = TopBar.create({
      from: appliedDep.name, to: appliedArr.name,
      currentDate: DATES[curIdx],
      prevDate:    curIdx > 0                ? DATES[curIdx - 1] : '',
      nextDate:    curIdx < DATES.length - 1 ? DATES[curIdx + 1] : '',
      activeTab:   activeTab,
    });
  }

  /* ── 정렬 헬퍼 ── */
  function parseDurMin(s) {
    var h = 0, m = 0;
    var hm = (s || '').match(/(\d+)시간/); var mm = (s || '').match(/(\d+)분/);
    if (hm) h = parseInt(hm[1]); if (mm) m = parseInt(mm[1]);
    return h * 60 + m;
  }
  function parseMinPrice(seats) {
    var min = Infinity;
    (seats || []).forEach(function (s) {
      if (!s.price || s.dash) return;
      var n = parseInt(s.price.replace(/[^0-9]/g, ''));
      if (!isNaN(n) && n < min) min = n;
    });
    return min;
  }
  function parseDepartMin(t) {
    var p = (t || '00:00').split(':');
    return parseInt(p[0]) * 60 + parseInt(p[1]);
  }
  function sortData(arr) {
    var copy = arr.slice();
    switch (currentSort) {
      case '최단소요순':
        copy.sort(function (a, b) { return parseDurMin(a.duration) - parseDurMin(b.duration); });
        break;
      case '최저가순':
        copy.sort(function (a, b) { return parseMinPrice(a.seats) - parseMinPrice(b.seats); });
        break;
      case '느린시간순':
        copy.sort(function (a, b) { return parseDepartMin(b.departTime) - parseDepartMin(a.departTime); });
        break;
      case '빠른시간순':
        copy.sort(function (a, b) { return parseDepartMin(a.departTime) - parseDepartMin(b.departTime); });
        break;
    }
    return copy;
  }

  function renderTrainList() {
    var data     = TRAIN_DATA_BY_DATE[DATES[curIdx]] || [];
    var filtered = data.filter(function (d) {
      if (soldoutActive && d.type === 'soldout') return false;
      if (activeTab === '전체') return true;
      return d.trainType === activeTab;
    });
    var sorted = sortData(filtered);
    var list = document.getElementById('train-list');
    list.innerHTML = sorted.map(function (d) {
      return d.type === 'normal' ? TrainCard.create(d) : TrainCardSoldout.create(d);
    }).join('');
    Object.keys(compareSelected).forEach(function (id) {
      var img = document.querySelector('#train-list [data-compare-id="' + id + '"] [data-compare-badge] img');
      if (img) img.src = COMPARE_CHECKED;
    });
  }

  /* ── 날짜 변경 핵심 함수 ── */
  function changeDate(newIdx) {
    if (newIdx < 0 || newIdx >= DATES.length) return;
    curIdx = newIdx;
    compareSelected = {};          /* 날짜 바뀌면 비교 선택 초기화 */
    updateCompareBar();
    renderTopBar();
    renderTrainList();
  }

  /* TopBar onclick에서 직접 호출되는 전역 함수 */
  window._goPrevDate   = function () { changeDate(curIdx - 1); };
  window._goNextDate   = function () { changeDate(curIdx + 1); };
  window._openDateSheet = function () { openDateSheet(); };

  /* ── 초기화 ── */
  function init() {
    renderTopBar();
    document.getElementById('root-filter-bar').innerHTML = FilterBar.create({ soldoutActive: soldoutActive, currentSort: currentSort });
    renderTrainList();
  }

  init();

  /* ── 탭 상호작용 ── */
  document.addEventListener('click', function (e) {
    var tab = e.target.closest('.tab');
    if (tab) {
      activeTab = tab.getAttribute('data-tab');
      document.querySelectorAll('.train-type-tabs .tab').forEach(function (t) { t.classList.remove('active'); });
      tab.classList.add('active');
      renderTrainList();
    }
  });

  /* ── 날짜 네비게이션 (event delegation 보조) ── */
  document.addEventListener('click', function (e) {
    if (e.target.closest('#date-prev')) { changeDate(curIdx - 1); }
    if (e.target.closest('#date-next')) { changeDate(curIdx + 1); }
  });

  /* ── 매진제외 토글 ── */
  document.addEventListener('click', function (e) {
    if (!e.target.closest('#soldout-btn')) return;
    soldoutActive = !soldoutActive;
    document.getElementById('root-filter-bar').innerHTML = FilterBar.create({ soldoutActive: soldoutActive, currentSort: currentSort });
    renderTrainList();
  });

  document.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-compare-btn]');
    if (!btn) return;
    e.stopPropagation();

    var card = btn.closest('[data-compare-id]');
    if (!card) return;
    var id = card.getAttribute('data-compare-id');

    var badge = btn.querySelector('[data-compare-badge]');
    var img   = badge && badge.querySelector('img');
    if (!badge || !img) return;

    var isInSheet = !!card.closest('#compare-sheet-cards');

    if (!compareSelected[id]) {
      compareSelected[id] = true;
      img.src = COMPARE_CHECKED;
    } else {
      delete compareSelected[id];
      img.src = COMPARE_UNCHECK;

      if (isInSheet) {
        /* 바텀시트 내 해제: 카드 제거 + 메인 목록 배지 동기화 */
        card.remove();
        var mainImg = document.querySelector('#train-list [data-compare-id="' + id + '"] [data-compare-badge] img');
        if (mainImg) mainImg.src = COMPARE_UNCHECK;
        if (Object.keys(compareSelected).length === 0) closeCompareSheet();
      }
    }
    updateCompareBar();
  });

  /* ── 바텀시트 열기/닫기 ── */
  document.getElementById('compare-float-bar').addEventListener('click', openCompareSheet);

  document.addEventListener('click', function (e) {
    if (e.target.closest('#compare-sheet-close')) { closeCompareSheet(); return; }
    if (e.target.id === 'sheet-overlay') {
      closeCompareSheet();
      closeSortSheet();
      closeRouteSheet();
      closeDateSheet();
    }
  });

  function openCompareSheet() {
    var cardsEl = document.getElementById('compare-sheet-cards');
    cardsEl.innerHTML = (TRAIN_DATA_BY_DATE[DATES[curIdx]] || [])
      .filter(function (d) { return d.type === 'normal' && compareSelected[d.trainNumber]; })
      .map(function (d) { return TrainCard.create(d); })
      .join('');
    /* 바텀시트 내 모든 비교 배지를 활성(checked) 상태로 설정 */
    cardsEl.querySelectorAll('[data-compare-badge] img').forEach(function (img) {
      img.src = COMPARE_CHECKED;
    });
    document.getElementById('sheet-overlay').classList.add('open');
    document.getElementById('compare-sheet').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeCompareSheet() {
    document.getElementById('sheet-overlay').classList.remove('open');
    document.getElementById('compare-sheet').classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateCompareBar() {
    var bar   = document.getElementById('compare-float-bar');
    var count = Object.keys(compareSelected).length;
    if (count > 0) {
      bar.classList.add('visible');
      document.getElementById('compare-float-text').textContent = '열차 비교하기(' + count + ')';
    } else {
      bar.classList.remove('visible');
    }
  }

  /* ════════════════════════════════════════
     정렬 바텀시트 로직
  ════════════════════════════════════════ */
  function openSortSheet() {
    renderSortOptions();
    openOverlay();
    document.getElementById('sort-sheet').classList.add('open');
  }
  function closeSortSheet() {
    document.getElementById('sort-sheet').classList.remove('open');
    closeOverlay();
  }
  function renderSortOptions() {
    document.querySelectorAll('#sort-options-list .sort-option').forEach(function (opt) {
      opt.classList.toggle('active', opt.dataset.sort === currentSort);
    });
  }

  document.addEventListener('click', function (e) {
    /* 정렬 버튼 열기 */
    if (e.target.closest('#sort-btn')) { openSortSheet(); return; }
    /* 닫기 */
    if (e.target.closest('#sort-close-btn')) { closeSortSheet(); return; }
    /* 옵션 선택 */
    var opt = e.target.closest('#sort-options-list .sort-option');
    if (opt) {
      currentSort = opt.dataset.sort;
      renderSortOptions();
      renderTrainList();
      document.getElementById('root-filter-bar').innerHTML =
        FilterBar.create({ soldoutActive: soldoutActive, currentSort: currentSort });
      closeSortSheet();
    }

  /* ════════════════════════════════════════

  ════════════════════════════════════════ */
  function openRouteSheet() {
    routeTempDep      = { name: appliedDep.name, code: appliedDep.code };
    routeTempArr      = { name: appliedArr.name, code: appliedArr.code };
    routeTempTripType = appliedTripType;
    showRouteMain();
    renderRouteMain();
    openOverlay();
    document.getElementById('route-sheet').classList.add('open');
  }

  function closeRouteSheet() {
    document.getElementById('route-sheet').classList.remove('open');
    closeOverlay();
  }

  function showRouteMain() {
    document.getElementById('route-sheet-main').style.display  = 'block';
    document.getElementById('route-sheet-picker').style.display = 'none';
  }

  function renderRouteMain() {
    document.getElementById('rs-dep-name').textContent = routeTempDep.name;
    document.getElementById('rs-dep-code').textContent = routeTempDep.code;
    document.getElementById('rs-arr-name').textContent = routeTempArr.name;
    document.getElementById('rs-arr-code').textContent = routeTempArr.code;
    document.getElementById('trip-oneway').className = 'trip-tab' + (routeTempTripType === 'oneway'    ? ' active' : '');
    document.getElementById('trip-round').className  = 'trip-tab' + (routeTempTripType === 'roundtrip' ? ' active' : '');
    document.getElementById('route-cs-summary').innerHTML =
      '<span class="cs-blue">'  + routeTempDep.name + ' → ' + routeTempArr.name + ' </span>' +
      '<span class="cs-black">탑승객 1명</span>';
  }

  function openStationPicker(type) {
    routePickerFor = type;
    document.getElementById('rs-picker-title').textContent = type === 'dep' ? '출발역 선택' : '도착역 선택';
    var cur  = type === 'dep' ? routeTempDep.code : routeTempArr.code;
    var list = document.getElementById('rs-station-list');
    list.innerHTML = '';
    STATIONS.forEach(function (s) {
      var isSel = s.code === cur;
      var li = document.createElement('li');
      li.className = 'stn-pick-item' + (isSel ? ' active' : '');
      li.innerHTML =
        '<div class="stn-pick-left"><span class="stn-pick-name">' + s.name + '</span><span class="stn-pick-code">' + s.code + '</span></div>' +
        '<span class="stn-pick-check"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>';
      li.addEventListener('click', function () { selectStation(s); });
      list.appendChild(li);
    });
    document.getElementById('route-sheet-main').style.display  = 'none';
    document.getElementById('route-sheet-picker').style.display = 'block';
  }

  function selectStation(s) {
    if (routePickerFor === 'dep') {
      if (s.code === routeTempArr.code) routeTempArr = { name: routeTempDep.name, code: routeTempDep.code };
      routeTempDep = { name: s.name, code: s.code };
    } else {
      if (s.code === routeTempDep.code) routeTempDep = { name: routeTempArr.name, code: routeTempArr.code };
      routeTempArr = { name: s.name, code: s.code };
    }
    showRouteMain();
    renderRouteMain();
  }

  ════════════════════════════════════════ */
  function getDateFromCurIdx() {
    /* DATES 형식 'MM.DD(요일)' → Date 객체 */
    var m = DATES[curIdx].match(/(\d+)\.(\d+)/);
    if (!m) return new Date();
    return new Date(2026, parseInt(m[1]) - 1, parseInt(m[2]));
  }

  function openDateSheet() {
    calTempDate  = getDateFromCurIdx();
    calTempHour  = calAppliedHour;
    calViewYear  = calTempDate.getFullYear();
    calViewMonth = calTempDate.getMonth();
    renderCalSheet();
    updateCalSummary();
    initTimeChipsOnce();
    updateTimeChipsUI();
    openOverlay();
    document.getElementById('date-sheet').classList.add('open');
  }

  function closeDateSheet() {
    document.getElementById('date-sheet').classList.remove('open');
    closeOverlay();
  }

  function renderCalSheet() {
    document.getElementById('cal-month-lbl').textContent =
      calViewYear + '년 ' + (calViewMonth + 1 < 10 ? '0' : '') + (calViewMonth + 1) + '월';

    var grid     = document.getElementById('cal-grid-cs');
    grid.innerHTML = '';

    var firstDow = new Date(calViewYear, calViewMonth, 1).getDay();
    var lastDay  = new Date(calViewYear, calViewMonth + 1, 0).getDate();
    var cells    = [];
    for (var i = 0; i < firstDow; i++) cells.push(null);
    for (var d = 1; d <= lastDay; d++) cells.push(d);
    while (cells.length < 42) cells.push(null); /* 항상 6행(42칸) 고정 */

    for (var r = 0; r < cells.length / 7; r++) {
      var row = document.createElement('div');
      row.className = 'cal-row';
      for (var c = 0; c < 7; c++) {
        var day  = cells[r * 7 + c];
        var cell = document.createElement('div');
        cell.className = 'cal-cell';
        if (!day) {
          cell.classList.add('empty');
        } else {
          var cd      = new Date(calViewYear, calViewMonth, day);
          var isToday = cd.getTime() === TODAY.getTime();
          var isPast  = cd < TODAY;
          var isSel   = calTempDate && cd.getTime() === calTempDate.getTime();
          if (isPast)  cell.classList.add('past');
          if (isToday) cell.classList.add('today');
          if (isSel)   cell.classList.add('sel');
          var numEl = document.createElement('span');
          numEl.className   = 'cal-cell-num';
          numEl.textContent = day;
          cell.appendChild(numEl);
          if (isToday) {
            var lbl = document.createElement('span');
            lbl.className   = 'cal-today-lbl';
            lbl.textContent = '오늘';
            cell.appendChild(lbl);
          }
          if (!isPast) {
            (function (yr, mo, dy) {
              cell.addEventListener('click', function () {
                calTempDate = new Date(yr, mo, dy);
                renderCalSheet();
                updateCalSummary();
              });
            })(calViewYear, calViewMonth, day);
          }
        }
        row.appendChild(cell);
      }
      grid.appendChild(row);
    }
  }

  function updateCalSummary() {
    if (!calTempDate) return;
    var m   = calTempDate.getMonth() + 1;
    var d   = calTempDate.getDate();
    var dow = CAL_DAYS[calTempDate.getDay()];
    document.getElementById('cal-date-summary').innerHTML =
      '<span class="cs-blue">' + m + '월 ' + d + '일(' + dow + ') ' +
      (calTempHour < 10 ? '0' : '') + calTempHour + '시 </span>' +
      '<span class="cs-black">이후 출발</span>';
  }

  /* ── 시간 뱃지 ── */
  var timeChipsReady = false;

  function initTimeChipsOnce() {
    if (timeChipsReady) return;
    timeChipsReady = true;

    /* 00~23시 뱃지 생성 */
    var row = document.getElementById('time-chip-row');
    for (var h = 0; h < 24; h++) {
      var btn = document.createElement('button');
      btn.className = 'time-chip';
      btn.dataset.hour = h;
      btn.textContent = (h < 10 ? '0' : '') + h + '시';
      row.appendChild(btn);
    }

    /* 뱃지 클릭 선택 */
    row.addEventListener('click', function (e) {
      if (isDraggingChips) return; /* 드래그 중엔 선택 막기 */
      var chip = e.target.closest('.time-chip');
      if (!chip) return;
      calTempHour = parseInt(chip.dataset.hour);
      updateTimeChipsUI();
      updateCalSummary();
    });

    /* 마우스 드래그 스크롤 */
    var startX, scrollLeft;
    var isDraggingChips = false;

    row.addEventListener('mousedown', function (e) {
      isDraggingChips = false;
      startX     = e.pageX - row.offsetLeft;
      scrollLeft = row.scrollLeft;
      row.style.cursor = 'grabbing';
    });
    row.addEventListener('mousemove', function (e) {
      if (e.buttons !== 1) return;
      var dx = e.pageX - row.offsetLeft - startX;
      if (Math.abs(dx) > 4) isDraggingChips = true;
      if (isDraggingChips) { e.preventDefault(); row.scrollLeft = scrollLeft - dx; }
    });
    document.addEventListener('mouseup', function () {
      row.style.cursor = 'grab';
      setTimeout(function () { isDraggingChips = false; }, 0);
    });
  }

  function updateTimeChipsUI() {
    document.querySelectorAll('#time-chip-row .time-chip').forEach(function (chip) {
      chip.classList.toggle('sel', parseInt(chip.dataset.hour) === calTempHour);
    });
    var sel = document.querySelector('#time-chip-row .time-chip.sel');
    if (sel) sel.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  }

  /* ════════════════════════════════════════
     공유 오버레이 관리
  ════════════════════════════════════════ */
  function openOverlay()  { document.getElementById('sheet-overlay').classList.add('open'); }
  function closeOverlay() { document.getElementById('sheet-overlay').classList.remove('open'); }

  /* ════════════════════════════════════════
     이벤트 - 출도착지 시트
  ════════════════════════════════════════ */
  document.addEventListener('click', function (e) {
    /* 돋보기 아이콘 또는 출도착 문구 클릭 */
    if (e.target.closest('.route-center') || e.target.closest('.search-icon')) {
      openRouteSheet(); return;
    }
    /* 닫기 */
    if (e.target.closest('#rs-close-btn') || e.target.closest('#rs-picker-close')) {
      closeRouteSheet(); return;
    }
    /* 뒤로 */
    if (e.target.closest('#rs-picker-back')) {
      showRouteMain(); return;
    }
    /* 편도 / 왕복 탭 */
    if (e.target.id === 'trip-oneway') { routeTempTripType = 'oneway';    renderRouteMain(); return; }
    if (e.target.id === 'trip-round')  { routeTempTripType = 'roundtrip'; renderRouteMain(); return; }
    /* 역 선택 버튼 */
    if (e.target.closest('#rs-dep-btn')) { openStationPicker('dep'); return; }
    if (e.target.closest('#rs-arr-btn')) { openStationPicker('arr'); return; }
    /* 교환 버튼 */
    if (e.target.closest('#rs-swap-btn')) {
      var tmp = { name: routeTempDep.name, code: routeTempDep.code };
      routeTempDep = { name: routeTempArr.name, code: routeTempArr.code };
      routeTempArr = tmp;
      renderRouteMain(); return;
    }
    /* 검색하기 */
    if (e.target.closest('#rs-apply-btn')) {
      appliedDep      = { name: routeTempDep.name, code: routeTempDep.code };
      appliedArr      = { name: routeTempArr.name, code: routeTempArr.code };
      appliedTripType = routeTempTripType;
      renderTopBar();
      closeRouteSheet(); return;
    }
  });

  /* ════════════════════════════════════════
     이벤트 - 날짜 시트
  ════════════════════════════════════════ */
  document.addEventListener('click', function (e) {
    /* 달력 아이콘 또는 날짜 텍스트 클릭 → TopBar onclick이 먼저 처리하므로 보조만 */
    if (e.target.closest('.date-current')) { openDateSheet(); return; }
    /* 새로고침 → 오늘 날짜에 가장 가까운 DATES로 이동 */
    if (e.target.closest('.refresh-btn')) {
      var todayFmt = (TODAY.getMonth()+1 < 10 ? '0' : '') + (TODAY.getMonth()+1) + '.' +
                     (TODAY.getDate() < 10 ? '0' : '') + TODAY.getDate() + '(' + CAL_DAYS[TODAY.getDay()] + ')';
      var idx = DATES.indexOf(todayFmt);
      if (idx >= 0) { changeDate(idx); }
      calAppliedHour = 6; return;
    }
    /* 날짜 시트 닫기 */
    if (e.target.closest('#ds-close-btn')) { closeDateSheet(); return; }
    /* 이전/다음 달 */
    if (e.target.closest('#cal-prev-mo')) {
      calViewMonth--;
      if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
      renderCalSheet(); return;
    }
    if (e.target.closest('#cal-next-mo')) {
      calViewMonth++;
      if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
      renderCalSheet(); return;
    }
    /* 변경하기 */
    if (e.target.closest('#ds-apply-btn')) {
      calAppliedHour = calTempHour;
      if (calTempDate) {
        var m2 = (calTempDate.getMonth()+1 < 10 ? '0' : '') + (calTempDate.getMonth()+1);
        var d2 = (calTempDate.getDate() < 10 ? '0' : '') + calTempDate.getDate();
        var fmt = m2 + '.' + d2 + '(' + CAL_DAYS[calTempDate.getDay()] + ')';
        var fi  = DATES.indexOf(fmt);
        if (fi >= 0) { changeDate(fi); }
      }
      closeDateSheet(); return;
    }
  });

  /* ── 매진카드 펼침/접힘 토글 ── */
  var ARROW_DOWN = '<svg width="20" height="20" viewBox="0 0 24 24" fill="#8e8e8e"><path d="M7 10l5 5 5-5z"/></svg>';
  var ARROW_UP   = '<svg width="20" height="20" viewBox="0 0 24 24" fill="#8e8e8e"><path d="M7 14l5-5 5 5z"/></svg>';

  document.addEventListener('click', function (e) {
    var header = e.target.closest('.collapsed-toggle');
    if (!header) return;
    var card = header.closest('.soldout-card');
    if (!card) return;

    var body      = card.querySelector('.soldout-body');
    var footer    = card.querySelector('.soldout-footer');
    var icon      = header.querySelector('.toggle-icon');
    var timeLabel = header.querySelector('.header-time');

    if (!body) return;
    var isCollapsed = body.style.display === 'none';

    if (isCollapsed) {
      /* 접힘 → 펼침 */
      body.style.display   = '';
      footer.style.display = '';
      if (timeLabel) timeLabel.style.display = 'none'; /* 펼쳐지면 헤더 시간 숨김 */
      icon.innerHTML = ARROW_UP;
    } else {
      /* 펼침 → 접힘 */
      body.style.display   = 'none';
      footer.style.display = 'none';
      if (timeLabel) timeLabel.style.display = ''; /* 접히면 헤더 시간 노출 */
      icon.innerHTML = ARROW_DOWN;
    }
  });
</script>
